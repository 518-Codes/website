<!doctype html>
<!-- @dsCard group="UI Kit — Flyers" name="Flyer C · Paper" subtitle="Standalone print-ready · paper/greenbar" -->
<html lang="en" data-screen-label="Flyer C · Paper">
<head>
<meta charset="utf-8">
<title>518.codes — Flyer C · Paper</title>
<link rel="icon" href="../../../assets/logos/favicon.svg">
<link rel="stylesheet" href="../../../colors_and_type.css">
<style>
  @page { size: letter portrait; margin: 0; }
  html, body { margin: 0; }
  body {
    background: #d4d2c4;
    display: flex; justify-content: center; align-items: flex-start;
    padding: 32px;
    min-height: 100vh; box-sizing: border-box;
  }
  .flyer {
    width: 816px; height: 1056px;
    position: relative; overflow: hidden;
    font-family: var(--font-mono);
    box-shadow: 0 12px 40px rgba(0,0,0,0.35);
  }
  .flyer-c {
    background: var(--paper-bg); color: var(--paper-fg);
    padding: 60px 56px 48px;
    display: flex; flex-direction: column;
  }
  .flyer-c::before {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background-image: repeating-linear-gradient(180deg,
      transparent 0 36px, rgba(31,138,76,0.08) 36px 72px);
  }
  .flyer-c > * { position: relative; }
  .flyer-c .top {
    display: flex; justify-content: space-between; align-items: center;
    padding-bottom: 16px; border-bottom: 2px solid var(--paper-fg);
  }
  .flyer-c .wm { font-weight: 800; font-size: 32px; letter-spacing: -0.02em; }
  .flyer-c .wm .g { color: var(--paper-accent); }
  .flyer-c .stamp {
    display: inline-block; border: 2.5px solid var(--paper-accent);
    color: var(--paper-accent); padding: 6px 14px;
    font-size: 13px; letter-spacing: 0.22em; transform: rotate(-2deg);
    font-weight: 700; white-space: nowrap;
  }
  .flyer-c .label {
    font-size: 13px; letter-spacing: 0.22em; text-transform: uppercase;
    color: #3C4A3C; margin-top: 36px;
  }
  .flyer-c h1 {
    font-size: 76px; font-weight: 800; letter-spacing: -0.025em;
    line-height: 0.98; margin: 14px 0 0; max-width: 11ch;
  }
  .flyer-c h1 .hl { background: var(--paper-accent); color: var(--paper-bg); padding: 0 8px; }
  .flyer-c .sub {
    margin-top: 28px; font-size: 22px; color: #1c2a1c;
    line-height: 1.4; max-width: 28ch; font-weight: 500;
  }
  .flyer-c .cities { margin-top: 28px; display: flex; flex-wrap: wrap; gap: 8px; }
  .flyer-c .city {
    border: 1.5px solid var(--paper-fg); padding: 5px 12px;
    font-size: 14px; font-weight: 500; letter-spacing: 0.04em;
  }
  .flyer-c .scan-row {
    margin-top: auto; border-top: 2px solid var(--paper-fg);
    padding-top: 28px; display: grid; grid-template-columns: 1fr auto;
    gap: 28px; align-items: center;
  }
  .flyer-c .scan-row .cta .k {
    font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--paper-accent); font-weight: 700;
  }
  .flyer-c .scan-row .cta .u {
    font-size: 38px; font-weight: 800; letter-spacing: -0.02em; margin-top: 10px;
  }
  .flyer-c .scan-row .cta .u .g { color: var(--paper-accent); }
  .flyer-c .scan-row .cta .alt { font-size: 14px; color: #3C4A3C; margin-top: 8px; }
  .qr-block {
    width: 230px; height: 230px;
    background: #ffffff; color: var(--paper-fg);
    display: grid; place-items: center;
    font-family: var(--font-mono); font-weight: 800; font-size: 18px;
    letter-spacing: 0.04em; position: relative;
    border: 2px solid var(--paper-fg);
  }
  .qr-block::after {
    content: "scan →"; position: absolute; bottom: 16px; right: 16px;
    font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 700;
  }
  @media print {
    body { background: none; padding: 0; }
    .flyer { box-shadow: none; }
  }

  /* QR rendered at load (Discord invite). Block padding = quiet zone. */
  .qr-block { box-shadow: none !important; padding: 16px; box-sizing: border-box; }
  .qr-block svg { display: block; width: 100%; height: 100%; }
  .qr-block::after { content: none !important; }
</style>
</head>
<body>
<div class="flyer flyer-c" data-mode="paper">
  <div class="top">
    <div class="wm"><span class="g">$</span>518<span class="g">.</span>codes</div>
    <div class="stamp">FREE · OPEN · LOCAL</div>
  </div>
  <div class="label">// community bulletin · capital region, ny</div>
  <h1>A social club for people who write <span class="hl">code</span>.</h1>
  <div class="sub">Free, volunteer-run meetups in the 518. First-timers always welcome.</div>
  <div class="cities">
    <div class="city">Albany</div>
    <div class="city">Troy</div>
    <div class="city">Schenectady</div>
    <div class="city">Saratoga</div>
  </div>
  <div class="scan-row">
    <div class="cta">
      <div class="k">// join the room</div>
      <div class="u">518<span class="g">.</span>codes</div>
      <div class="alt">scan → discord · upcoming events · ical</div>
    </div>
    <div class="qr-block" data-qr-fg="#0B0F0B"></div>
  </div>
</div>

<script src="https://unpkg.com/qrcode-generator@1.4.4/qrcode.js"></script>
<script>
(function(){
  function build(fg){
    var qr = qrcode(0, 'M');
    qr.addData('https://discord.gg/U57hDJv5r');
    qr.make();
    var n = qr.getModuleCount(), cell = 10, size = n * cell;
    var out = ['<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ' + size + ' ' + size + '" width="100%" height="100%" shape-rendering="crispEdges" preserveAspectRatio="xMidYMid meet">'];
    for (var r = 0; r < n; r++) for (var c = 0; c < n; c++) {
      if (qr.isDark(r, c)) out.push('<rect x="' + (c*cell) + '" y="' + (r*cell) + '" width="' + cell + '" height="' + cell + '" fill="' + fg + '"/>');
    }
    out.push('</svg>');
    return out.join('');
  }
  function render(){
    if (typeof qrcode === 'undefined') return;
    document.querySelectorAll('.qr-block').forEach(function(b){
      var fg = b.getAttribute('data-qr-fg') || '#0B0F0B';
      b.innerHTML = build(fg);
    });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', render);
  else render();
})();
</script>
</body>
</html>
