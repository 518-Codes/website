<!doctype html>
<!-- @dsCard group="UI Kit — Flyers" name="Flyer B · Brutalist" subtitle="Standalone print-ready · brutalist huge type" -->
<html lang="en" data-screen-label="Flyer B · Brutalist">
<head>
<meta charset="utf-8">
<title>518.codes — Flyer B · Brutalist</title>
<link rel="icon" href="../../../assets/logos/favicon.svg">
<link rel="stylesheet" href="../../../colors_and_type.css">
<style>
  @page { size: letter portrait; margin: 0; }
  html, body { margin: 0; }
  body {
    background: #d4d2c4;
    display: flex; justify-content: center; align-items: flex-start;
    padding: 32px; min-height: 100vh; box-sizing: border-box;
  }
  .flyer {
    width: 816px; height: 1056px;
    position: relative; overflow: hidden;
    font-family: var(--font-mono);
    box-shadow: 0 12px 40px rgba(0,0,0,0.35);
  }
  .flyer-b {
    background: var(--term-bg); color: var(--term-fg);
    display: grid; grid-template-rows: auto 1fr auto;
  }
  .flyer-b .top {
    background: var(--phosphor); color: var(--term-bg);
    padding: 18px 44px; border-bottom: 4px solid var(--term-fg);
    display: flex; justify-content: space-between; align-items: center; font-weight: 700;
  }
  .flyer-b .top .wm { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; }
  .flyer-b .top .tag { font-size: 14px; letter-spacing: 0.14em; }
  .flyer-b .body { padding: 36px 40px; display: flex; flex-direction: column; }
  .flyer-b .kicker {
    font-size: 14px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--phosphor); font-weight: 600;
  }
  .flyer-b .display {
    font-weight: 800; font-size: 108px; line-height: 0.86;
    letter-spacing: -0.045em; margin: 16px 0 0;
  }
  .flyer-b .display .l1 { display:block; color: var(--term-fg); }
  .flyer-b .display .l2 { display:block; color: var(--phosphor); }
  .flyer-b .display .l3 { display:block; color: var(--term-fg); }
  .flyer-b .tagline {
    font-size: 20px; color: var(--term-fg-dim); margin-top: 22px;
    max-width: 22ch; line-height: 1.35;
  }
  .flyer-b .scan {
    margin-top: auto; display: grid; grid-template-columns: 1fr auto;
    gap: 28px; align-items: end;
  }
  .flyer-b .scan .where .k {
    font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--term-fg-mute); margin-bottom: 6px;
  }
  .flyer-b .scan .where .city { font-size: 18px; color: var(--term-fg); line-height: 1.5; }
  .flyer-b .scan .where .city b { color: var(--phosphor); font-weight: 700; }
  .flyer-b .bottom {
    background: var(--phosphor); color: var(--term-bg);
    padding: 22px 44px; border-top: 4px solid var(--term-fg);
    display: flex; justify-content: space-between; align-items: center;
  }
  .flyer-b .bottom .big { font-size: 32px; font-weight: 800; letter-spacing: -0.01em; }
  .flyer-b .bottom .small { font-size: 13px; letter-spacing: 0.18em; }
  .qr-block {
    width: 200px; height: 200px;
    background: var(--phosphor); color: var(--term-bg);
    display: grid; place-items: center;
    font-family: var(--font-mono); font-weight: 800; font-size: 16px;
    letter-spacing: 0.04em; position: relative;
    box-shadow: inset 0 0 0 8px var(--term-bg), inset 0 0 0 10px var(--phosphor);
  }
  .qr-block::after {
    content: "scan →"; position: absolute; bottom: 16px; right: 16px;
    font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 700;
  }
  @media print {
    body { background: none; padding: 0; }
    .flyer { box-shadow: none; }
  }

  /* QR rendered at load (Discord invite). Block padding = quiet zone. */
  .qr-block { box-shadow: none !important; padding: 16px; box-sizing: border-box; }
  .qr-block svg { display: block; width: 100%; height: 100%; }
  .qr-block::after { content: none !important; }
</style>
</head>
<body>
<div class="flyer flyer-b">
  <div class="top">
    <div class="wm">$ 518.codes</div>
    <div class="tag">CAPITAL REGION · NY</div>
  </div>
  <div class="body">
    <div class="kicker">// a social club for software developers</div>
    <div class="display">
      <span class="l1">SHOW UP.</span>
      <span class="l2">WRITE CODE.</span>
      <span class="l3">SAY HI.</span>
    </div>
    <div class="tagline">Free, volunteer-run meetups across the 518.</div>
    <div class="scan">
      <div class="where">
        <div class="k">// where</div>
        <div class="city">
          Albany · Troy ·<br>
          Schenectady · Saratoga<br>
          <b>+ wherever your terminal is open</b>
        </div>
      </div>
      <div class="qr-block" data-qr-fg="#0B0F0B"></div>
    </div>
  </div>
  <div class="bottom">
    <div class="big">518.codes →</div>
    <div class="small">SCAN FOR DISCORD ↗</div>
  </div>
</div>

<script src="https://unpkg.com/qrcode-generator@1.4.4/qrcode.js"></script>
<script>
(function(){
  function build(fg){
    var qr = qrcode(0, 'M');
    qr.addData('https://discord.gg/U57hDJv5r');
    qr.make();
    var n = qr.getModuleCount(), cell = 10, size = n * cell;
    var out = ['<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ' + size + ' ' + size + '" width="100%" height="100%" shape-rendering="crispEdges" preserveAspectRatio="xMidYMid meet">'];
    for (var r = 0; r < n; r++) for (var c = 0; c < n; c++) {
      if (qr.isDark(r, c)) out.push('<rect x="' + (c*cell) + '" y="' + (r*cell) + '" width="' + cell + '" height="' + cell + '" fill="' + fg + '"/>');
    }
    out.push('</svg>');
    return out.join('');
  }
  function render(){
    if (typeof qrcode === 'undefined') return;
    document.querySelectorAll('.qr-block').forEach(function(b){
      var fg = b.getAttribute('data-qr-fg') || '#0B0F0B';
      b.innerHTML = build(fg);
    });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', render);
  else render();
})();
</script>
</body>
</html>
